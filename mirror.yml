name: nodejs
target:
  registry: ocx.sh
  repository: nodejs

source:
  type: url_index
  generator:
    command: ["uv", "run", "generate.py"]
    timeout_seconds: 240

# Bootstrap pass: linux only. macOS + Windows added back once linux is green
# end-to-end (see README "Adding platforms" section once written).
assets:
  linux/amd64:
    - "node-.*-linux-x64\\.tar\\.xz"
  linux/arm64:
    - "node-.*-linux-arm64\\.tar\\.xz"

asset_type:
  type: archive
  strip_components: 1

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "20.0.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

concurrency:
  max_downloads: 4
  max_bundles: 2
  max_pushes: 2
  rate_limit_ms: 200
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
