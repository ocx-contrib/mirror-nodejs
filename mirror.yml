name: nodejs
target:
  registry: ocx.sh
  repository: nodejs

source:
  type: url_index
  generator:
    command: ["uv", "run", "generate.py"]
    timeout_seconds: 240

assets:
  linux/amd64:
    - "node-.*-linux-x64\\.tar\\.xz"
  linux/arm64:
    - "node-.*-linux-arm64\\.tar\\.xz"
  darwin/amd64:
    - "node-.*-darwin-x64\\.tar\\.gz"
  darwin/arm64:
    - "node-.*-darwin-arm64\\.tar\\.gz"
  windows/amd64:
    - "node-.*-win-x64\\.zip"
  windows/arm64:
    - "node-.*-win-arm64\\.zip"

asset_type:
  type: archive
  strip_components: 1

metadata:
  default: metadata.json
  platforms:
    # Windows zips put node.exe at the archive root (no bin/ subdir), so
    # PATH must point at installPath itself rather than installPath/bin.
    windows/amd64: metadata-windows.json
    windows/arm64: metadata-windows.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "20.0.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

concurrency:
  max_downloads: 4
  max_bundles: 2
  max_pushes: 2
  rate_limit_ms: 200
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/amd64:
    runner: macos-latest
    prefix: ["arch", "-x86_64"]
  darwin/arm64:
    runner: macos-latest
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh
  windows/arm64:
    runner: windows-11-arm
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
